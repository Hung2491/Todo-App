worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # ----------------------------------------------------
    # LOAD BALACING CHO BACKEND (BE)
    # ----------------------------------------------------
    upstream backend_servers {
        # Sử dụng thuật toán Round Robin mặc định
        # Đã thêm các port 8000, 8001, 8002 theo yêu cầu
        server 127.0.0.1:8000;
        server 127.0.0.1:8001;
        server 127.0.0.1:8002;
    }

    server {
        # ----------------------------------------------------
        # FRONTEND (FE) LẮNG NGHE PORT 3002
        # ----------------------------------------------------
        listen 3002;
        server_name localhost;

        # -- Cấu hình Frontend --
        # Dưới đây là cấu hình phục vụ các file Frontend tĩnh (đã build ra thư mục dist)
        # Hãy cập nhật /path/to/todo-app/dist thành đường dẫn tuyệt đối thật trên máy hoặc container
        location / {
            root /path/to/todo-app/dist; 
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
            
        }

        # -- Cấu hình API Backend --
        # Base path của API BE là /tasks (trong BE-Todo/src/index.ts)
        location /tasks {
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
