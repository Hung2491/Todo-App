server {
    listen 3002;
    server_name localhost;

    # Đường dẫn này phải khớp với thư mục ông tạo trong Dockerfile
    root /usr/share/nginx/html/todo-app;
    index index.html;

    location / {
        # Hỗ trợ Single Page App (React/Vue/Vite) không bị lỗi 404 khi F5
        try_files $uri $uri/ /index.html;
    }

    # --- Cấu hình tối ưu Vận hành 2.2 ---
    # 1. Log riêng để dễ debug khi app sập
    access_log /var/log/nginx/todo_access.log;
    error_log /var/log/nginx/todo_error.log;

    # 2. Nén Gzip để tiết kiệm băng thông và tăng tốc (Mục Cảnh báo tài nguyên)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
