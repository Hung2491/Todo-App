services:
  # ── Frontend (React/Vite build → Nginx) ────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-app-frontend
    restart: unless-stopped
    ports:
      - "3002:3002"       # HTTP
      # - "443:443"   # HTTPS — bỏ comment khi đã có SSL cert
    networks:
      - todo-network

    # Ví dụ mount nginx config tuỳ chỉnh hoặc SSL certs:
    # volumes:
    #   - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    #   - /etc/letsencrypt:/etc/letsencrypt:ro

networks:
  todo-network:
    driver: bridge
