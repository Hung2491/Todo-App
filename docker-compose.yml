services:
  # ── Frontend (React/Vite build → Nginx) ────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-app-frontend
    # Thay unless-stopped bằng always để đảm bảo VPS reboot là app lên ngay
    restart: always 
    ports:
      - "3002:3002"
    
    # Gắn cấu hình để không bao giờ mất file (Mục 2.2 - Backup & Ổn định)
    volumes:
      - ./todo.conf:/etc/nginx/conf.d/todo.conf:ro
    
    # Giới hạn tài nguyên (Cực kỳ quan trọng để Prometheus cảnh báo)
    deploy:
      resources:
        limits:
          cpus: '0.50'      # Tối đa 50% CPU
          memory: 256M      # Tối đa 256MB RAM
        reservations:
          memory: 64M       # Luôn dành sẵn 64MB cho app

    # Kiểm tra sức khỏe định kỳ
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:3002/"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 10s
    networks:
      - todo-network
      
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - todo-network
    restart: always

  # ── Prometheus (Giám sát tài nguyên - Mục 2.2) ─────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9090:9090"
    networks:
      - todo-network
    restart: always
    
    # ── Node-Exporter (Soi CPU/RAM của con VM 103.252.73.200) ────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "8080:8080"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - todo-network
    restart: always

  # ── Grafana (Giao diện biểu đồ - Mở cổng 3000 để ông xem) ────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - todo-network
    restart: always

networks:
  todo-network:
    driver: bridge
  
volumes:
  prometheus_data:
  grafana_data:
