version: '3.8'

services:
  # ── Frontend (React/Vite build → Nginx) ────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-app-frontend
    restart: always 
    ports:
      - "3002:80"
    volumes:
      - ./todo.conf:/etc/nginx/conf.d/todo.conf:ro
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - todo-network
      
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    networks:
      - todo-network
    restart: always
 # ── Backend (React/Vite build → Nginx) ────────────────────────────────────
 backend:
    build: .
    container_name: todo-backend
    ports:
      - "8000:3000"
    # Nạp file .env vào trong container:
    env_file:
      - .env
    depends_on:
      - mongodb
    restart: always

  mongodb:
    image: mongo:latest
    container_name: todo-mongodb
    volumes:
      - mongo_data:/data/db
    restart: always

  # ── Prometheus (Giám sát tài nguyên - Mục 2.2) ─────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - todo-network
    restart: always
    
  # ── Node-Exporter (Soi CPU/RAM của con VM 103.252.73.200) ────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - todo-network
    restart: always

  # ── cAdvisor (Giám sát chi tiết từng Container Docker) ───────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - todo-network
    restart: always

  # ── Grafana (Giao diện biểu đồ - Mở cổng 3000 để ông xem) ────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - todo-network
    restart: always

networks:
  todo-network:
    driver: bridge
  
volumes:
  prometheus_data:
  grafana_data:
  mongo_data:

